<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFC Hub | Powered by AAYSDAO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --primary: #00FF00;
            --bg: #000000;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 255, 0, 0.15), transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-card {
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .task-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .task-btn:hover:not(.completed) {
            background: rgba(0, 255, 0, 0.05);
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .completed {
            border-color: var(--primary) !important;
            background: rgba(0, 255, 0, 0.1) !important;
        }

        .claim-btn-active {
            background: var(--primary) !important;
            color: #000 !important;
            font-weight: 800;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
            transform: translateY(-2px);
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse-slow 2s infinite;
        }
    </style>
</head>

<body class="p-6">

    <div class="mt-12 mb-10 text-center">
        <div class="flex items-center justify-center gap-2 mb-4">
            <div class="status-dot"></div>
            <span class="text-[10px] tracking-[0.4em] uppercase font-bold text-white/50">Terminal v3.0</span>
        </div>
        <h1 class="text-6xl font-bold tracking-tighter italic">
            $OFC <span class="text-[#00FF00]">TGE</span>
        </h1>
        <p class="text-white/40 mt-2 text-sm tracking-widest uppercase">Verified by @AAYSDAO</p>
    </div>

    <div class="flex gap-8 mb-12 tabular-nums">
        <div class="text-center">
            <span id="d" class="text-3xl font-light">00</span>
            <p class="text-[9px] uppercase tracking-widest text-white/30">Days</p>
        </div>
        <div class="text-center">
            <span id="h" class="text-3xl font-light">00</span>
            <p class="text-[9px] uppercase tracking-widest text-white/30">Hours</p>
        </div>
        <div class="text-center">
            <span id="m" class="text-3xl font-light text-[#00FF00]">00</span>
            <p class="text-[9px] uppercase tracking-widest text-white/30">Mins</p>
        </div>
    </div>

    <div class="w-full max-w-md main-card p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-bold tracking-tight text-lg">MISSIONS</h2>
            <span id="progress-tag" class="text-[10px] py-1 px-3 border border-white/10 rounded-full text-white/40">0/6 READY</span>
        </div>

        <div id="mission-list" class="space-y-3">
            </div>

        <div class="mt-8 pt-6 border-t border-white/5">
            <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-[#00FF00] w-0 transition-all duration-700"></div>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md mt-6">
        <a id="claim-btn" class="flex items-center justify-center gap-3 w-full py-5 rounded-2xl bg-white/5 border border-white/10 text-white/20 font-bold uppercase tracking-widest cursor-not-allowed transition-all">
            <i data-lucide="lock" class="w-5 h-5"></i> Claim .Football ID
        </a>
    </div>

    <div class="mt-auto py-10">
        <p class="text-[11px] font-bold tracking-[0.5em] text-[#00FF00]">@AAYSDAO</p>
    </div>

    <script>
        const TARGET_DATE = new Date("April 9, 2026 00:00:00").getTime();
        
        // Removed self-follow per request
        const MISSIONS = [
            { id: 1, name: 'Follow OneFootball', handle: 'OneFootball' },
            { id: 2, name: 'Follow Base', handle: 'base' },
            { id: 3, name: 'Follow Animoca Brands', handle: 'animocabrands' },
            { id: 4, name: 'Follow FIFA Rivals', handle: 'FIFARivals' },
            { id: 5, name: 'Follow DNNS', handle: 'dnns_eth' },
            { id: 6, name: 'Follow viN040', handle: '_viN040' }
        ];

        let completed = JSON.parse(localStorage.getItem('aays_v3_state')) || [];

        function renderMissions() {
            const list = document.getElementById('mission-list');
            list.innerHTML = MISSIONS.map(m => {
                const isDone = completed.includes(m.id);
                return `
                    <div onclick="doMission(${m.id}, '${m.handle}')" 
                         class="task-btn p-4 rounded-2xl flex items-center justify-between cursor-pointer ${isDone ? 'completed' : ''}">
                        <div class="flex items-center gap-3">
                            <i data-lucide="${isDone ? 'check-circle-2' : 'circle'}" class="w-5 h-5 ${isDone ? 'text-black' : 'text-white/20'}"></i>
                            <span class="text-sm font-medium ${isDone ? 'text-black' : 'text-white/80'}">${m.name}</span>
                        </div>
                        <i data-lucide="external-link" class="w-4 h-4 ${isDone ? 'text-black' : 'text-white/10'}"></i>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
            updateUI();
        }

        window.doMission = (id, handle) => {
            if(!completed.includes(id)) {
                window.open(`https://x.com/intent/follow?screen_name=${handle}`, '_blank');
                completed.push(id);
                localStorage.setItem('aays_v3_state', JSON.stringify(completed));
                renderMissions();
            }
        };

        function updateUI() {
            const count = completed.length;
            const total = MISSIONS.length;
            const progress = (count / total) * 100;
            
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-tag').innerText = `${count}/${total} COMPLETED`;

            if(count === total) {
                const btn = document.getElementById('claim-btn');
                btn.classList.add('claim-btn-active');
                btn.classList.remove('cursor-not-allowed', 'text-white/20');
                btn.innerHTML = `<i data-lucide="zap" class="w-5 h-5"></i> CLAIM .FOOTBALL ID`;
                btn.href = "https://play.google.com/store/apps/details?id=de.motain.iliga";
                lucide.createIcons();
            }
        }

        // Countdown
        setInterval(() => {
            const now = new Date().getTime();
            const diff = TARGET_DATE - now;
            document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        }, 1000);

        renderMissions();
    </script>
</body>
</html>
