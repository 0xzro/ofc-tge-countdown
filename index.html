<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFC Hub | AAYSDAO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 50% -20%, #00ff0022, transparent),
                radial-gradient(circle at 0% 100%, #00ff0011, transparent);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
        }

        .task-node {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .task-node:hover:not(.done) {
            background: rgba(0, 255, 0, 0.05);
            border-color: #00FF00;
            transform: translateY(-2px);
        }

        .done {
            background: #00FF00 !important;
            color: #000 !important;
            border-color: #00FF00 !important;
            font-weight: 800;
        }

        .btn-primary {
            background: #00FF00;
            color: #000;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
            transform: scale(1.02);
        }

        .btn-disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
            50% { box-shadow: 0 0 30px rgba(0, 255, 0, 0.6); }
            100% { box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        }

        .claim-ready {
            animation: pulse-glow 2s infinite;
            background: #00FF00 !important;
            color: #000 !important;
            opacity: 1 !important;
        }
    </style>
</head>

<body class="flex flex-col items-center p-6">

    <header class="text-center mt-10 mb-8">
        <div class="inline-block px-4 py-1 rounded-full border border-[#00FF00]/30 bg-[#00FF00]/5 mb-4">
            <span class="text-[#00FF00] text-[10px] uppercase tracking-[0.3em] font-bold">AAYSDAO Ecosystem</span>
        </div>
        <h1 class="text-6xl font-extrabold tracking-tighter text-white mb-2">
            $OFC <span class="text-[#00FF00]">TGE</span>
        </h1>
        <p class="text-white/50 text-sm">Phase 1: Community Onboarding</p>
    </header>

    <div class="grid grid-cols-4 gap-4 w-full max-w-lg mb-10">
        <div class="glass-card p-4 text-center">
            <div id="d" class="text-2xl font-bold">00</div>
            <div class="text-[10px] uppercase text-white/40 tracking-widest">Days</div>
        </div>
        <div class="glass-card p-4 text-center">
            <div id="h" class="text-2xl font-bold">00</div>
            <div class="text-[10px] uppercase text-white/40 tracking-widest">Hrs</div>
        </div>
        <div class="glass-card p-4 text-center">
            <div id="m" class="text-2xl font-bold">00</div>
            <div class="text-[10px] uppercase text-white/40 tracking-widest">Min</div>
        </div>
        <div class="glass-card p-4 text-center">
            <div id="s" class="text-2xl font-bold text-[#00FF00]">00</div>
            <div class="text-[10px] uppercase text-white/40 tracking-widest">Sec</div>
        </div>
    </div>

    <main class="w-full max-w-md glass-card p-6 mb-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-sm font-bold uppercase tracking-wider">Missions</h3>
            <span id="txt" class="text-[#00FF00] text-xs font-mono">0/7 Complete</span>
        </div>

        <div class="w-full bg-white/5 h-1.5 rounded-full mb-8 overflow-hidden">
            <div id="bar" class="bg-[#00FF00] h-full w-0 transition-all duration-700 ease-out"></div>
        </div>

        <div class="space-y-3">
            <div id="task-list" class="grid grid-cols-1 gap-3">
                </div>
        </div>
    </main>

    <div class="w-full max-w-md space-y-4">
        <a id="tweet" target="_blank" class="flex items-center justify-center gap-2 w-full bg-white text-black py-4 rounded-2xl font-bold hover:bg-gray-200 transition-all">
            <i data-lucide="twitter" class="w-5 h-5"></i>
            Spread the Word
        </a>
        
        <a id="claim" class="btn-disabled flex items-center justify-center gap-2 w-full py-5 rounded-2xl font-black uppercase tracking-widest transition-all">
            <i data-lucide="lock" class="w-5 h-5"></i>
            Claim .FOOTBALL ID
        </a>
    </div>

    <script>
        // Config
        const TARGET_DATE = new Date("April 9, 2026 00:00:00").getTime();
        const TASKS_DATA = [
            { id: 'a', name: 'Follow AAYSDAO', handle: 'AAYSDAO' },
            { id: 'b', name: 'Follow OneFootball', handle: 'OneFootball' },
            { id: 'c', name: 'Follow Base', handle: 'base' },
            { id: 'd', name: 'Follow Animoca', handle: 'animocabrands' },
            { id: 'e', name: 'Follow FIFARivals', handle: 'FIFARivals' },
            { id: 'f', name: 'Follow dnns', handle: 'dnns_eth' },
            { id: 'g', name: 'Follow viN040', handle: '_viN040' }
        ];

        // State
        let completedTasks = JSON.parse(localStorage.getItem("ofc_tasks")) || [];

        // Initialize Tasks UI
        const taskContainer = document.getElementById('task-list');
        function initTasks() {
            taskContainer.innerHTML = TASKS_DATA.map(task => `
                <a href="https://x.com/intent/follow?screen_name=${task.handle}" 
                   target="_blank" 
                   onclick="handleTaskClick('${task.id}')"
                   id="task-${task.id}"
                   class="task-node flex items-center justify-between p-4 rounded-xl ${completedTasks.includes(task.id) ? 'done' : ''}">
                    <span class="text-sm tracking-wide">${task.name}</span>
                    <i data-lucide="${completedTasks.includes(task.id) ? 'check-circle-2' : 'external-link'}" class="w-4 h-4"></i>
                </a>
            `).join('');
            lucide.createIcons();
            updateProgress();
        }

        // Logic
        window.handleTaskClick = (id) => {
            if (!completedTasks.includes(id)) {
                completedTasks.push(id);
                localStorage.setItem("ofc_tasks", JSON.stringify(completedTasks));
                
                const el = document.getElementById(`task-${id}`);
                el.classList.add('done');
                
                // Refresh icons inside the clicked element
                setTimeout(() => {
                    initTasks();
                }, 500);
            }
        };

        function updateProgress() {
            const count = completedTasks.length;
            const total = TASKS_DATA.length;
            const percent = (count / total) * 100;
            
            document.getElementById('bar').style.width = `${percent}%`;
            document.getElementById('txt').innerText = `${count} / ${total} COMPLETED`;

            if (count === total) {
                const claimBtn = document.getElementById('claim');
                claimBtn.classList.remove('btn-disabled');
                claimBtn.classList.add('claim-ready');
                claimBtn.innerHTML = `<i data-lucide="zap" class="w-5 h-5"></i> CLAIM NOW`;
                claimBtn.href = "https://play.google.com/store/apps/details?id=de.motain.iliga";
                lucide.createIcons();
            }
        }

        // Countdown Timer
        setInterval(() => {
            const now = new Date().getTime();
            const diff = TARGET_DATE - now;

            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            }
        }, 1000);

        // Tweet Setup
        const tweetMsg = encodeURIComponent("$OFC Early Mission 🚀 Complete tasks & join the @AAYSDAO TGE ⚽️ #OFC #Base");
        document.getElementById('tweet').href = `https://x.com/intent/tweet?text=${tweetMsg}&url=${encodeURIComponent(window.location.href)}`;

        // Boot
        initTasks();
    </script>
</body>
</html>
