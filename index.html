<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>OFC TGE Countdown | Build by @AAYSDAO</title>
    <meta name="title" content="$OFC TGE Countdown - Build by @AAYSDAO">
    <meta name="description" content="Track the OneFootball Club TGE live on Base. April 9, 2026. Claim your .football ID now!">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="$OFC TGE Countdown - Build by @AAYSDAO">
    <meta property="og:description" content="The clock is ticking! Join the @OneFootball community on @Base.">
    <meta property="og:image" content="https://images.onefootball.com/icons/onefootball/128/en.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="$OFC TGE Countdown - Build by @AAYSDAO">
    <meta name="twitter:description" content="Only days left until $OFC TGE on @Base. Track live! 🕒⚽️">
    <meta name="twitter:image" content="https://images.onefootball.com/icons/onefootball/128/en.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .gradient-text { background: linear-gradient(90deg, #00FF00, #008000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .follow-btn { transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.1); }
        .follow-btn:hover { background: #fff; color: #000; transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="text-center mt-8">
        <p class="text-[#00FF00] font-bold text-xs tracking-widest uppercase mb-1">Build by @AAYSDAO</p>
        <h1 class="text-4xl md:text-6xl font-black gradient-text uppercase">$OFC TGE COUNTDOWN</h1>
        <p class="text-white/30 text-[10px] mt-2 uppercase tracking-widest">m10.football verified mission</p>
    </div>

    <div class="grid grid-cols-4 gap-3 mt-10 w-full max-w-xl">
        <div class="card p-4 rounded-xl text-center"><span id="days" class="text-3xl font-black text-[#00FF00]">00</span><p class="text-[8px] opacity-40 uppercase">Days</p></div>
        <div class="card p-4 rounded-xl text-center"><span id="hours" class="text-3xl font-black">00</span><p class="text-[8px] opacity-40 uppercase">Hours</p></div>
        <div class="card p-4 rounded-xl text-center"><span id="minutes" class="text-3xl font-black">00</span><p class="text-[8px] opacity-40 uppercase">Mins</p></div>
        <div class="card p-4 rounded-xl text-center"><span id="seconds" class="text-3xl font-black text-red-500">00</span><p class="text-[8px] opacity-40 uppercase">Secs</p></div>
    </div>

    <div class="mt-8 flex flex-col gap-3 w-full max-w-xs">
        <a id="tweet-intent" href="#" target="_blank" class="bg-blue-500 hover:bg-blue-400 text-white py-3 rounded-full font-bold text-sm text-center flex items-center justify-center gap-2">
            🚀 SHARE HYPE ON X
        </a>
    </div>

    <div class="mt-10 w-full max-w-md card p-6 rounded-3xl">
        <h3 class="text-center text-[10px] font-bold mb-6 opacity-60 tracking-[0.2em] uppercase">Bullish $OFC? Follow the Squad</h3>
        <div class="grid grid-cols-2 gap-3">
            <a href="https://x.com/intent/follow?screen_name=AAYSDAO" target="_blank" class="follow-btn p-3 rounded-xl text-[10px] font-bold text-center">@AAYSDAO</a>
            <a href="https://x.com/intent/follow?screen_name=OneFootball" target="_blank" class="follow-btn p-3 rounded-xl text-[10px] font-bold text-center">@OneFootball</a>
            <a href="https://x.com/intent/follow?screen_name=base" target="_blank" class="follow-btn p-3 rounded-xl text-[10px] font-bold text-center">@Base</a>
            <a href="https://x.com/intent/follow?screen_name=animocabrands" target="_blank" class="follow-btn p-3 rounded-xl text-[10px] font-bold text-center">@animocabrands</a>
            <a href="https://x.com/intent/follow?screen_name=FIFARivals" target="_blank" class="follow-btn p-3 rounded-xl text-[10px] font-bold text-center">@FIFARivals</a>
            <a href="https://x.com/intent/follow?screen_name=dnns_eth" target="_blank" class="follow-btn p-3 rounded-xl text-[10px] font-bold text-center">@dnns_eth</a>
            <a href="https://x.com/intent/follow?screen_name=_viN040" target="_blank" class="follow-btn p-3 rounded-xl text-[10px] font-bold text-center">@_viN040</a>
        </div>
    </div>

    <div class="mt-8 w-full max-w-md px-4 pb-12">
        <a href="https://play.google.com/store/apps/details?id=de.motain.iliga" target="_blank" class="block w-full bg-[#00FF00] text-black font-black py-4 rounded-2xl text-center hover:scale-[1.02] transition-transform uppercase text-sm shadow-[0_0_30px_rgba(0,255,0,0.1)]">
            📲 Get App & Claim .football ID
        </a>
    </div>

    <script>
        // TARGET DATE: April 9, 2026
        const targetDate = new Date("April 9, 2026 00:00:00").getTime();
        
        function update() {
            const now = new Date().getTime();
            const dist = targetDate - now;
            
            const d = Math.floor(dist / (1000 * 60 * 60 * 24));
            const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((dist % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');

            // Set up Viral Tweet with handles and hashtags
            const text = encodeURIComponent(`The $OFC clock is ticking! 🕒⚽️\n\nOnly ${d} days to @OneFootball TGE on @Base. Build by @AAYSDAO.\n\nTrack live:`);
            const hashtags = "OFC,Base,AAYSDAO,OneFootball";
            document.getElementById("tweet-intent").href = `https://x.com/intent/tweet?text=${text}&url=${encodeURIComponent(window.location.href)}&hashtags=${hashtags}`;
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
