<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OFC Hub | AAYSDAO</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:#fff; font-family: Inter, sans-serif; }
.gradient-text {
  background: linear-gradient(90deg,#00FF00,#008000);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.card {
  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
}
.done { background:#00FF00 !important; color:#000 !important; }
</style>
</head>

<body class="flex flex-col items-center p-4">

<!-- HEADER -->
<div class="text-center mt-6">
  <p class="text-[#00FF00] text-xs uppercase tracking-widest">Build by @AAYSDAO</p>
  <h1 class="text-4xl md:text-6xl font-black gradient-text mt-2">$OFC TGE</h1>
</div>

<!-- COUNTDOWN -->
<div class="grid grid-cols-4 gap-3 mt-8 w-full max-w-xl">
  <div class="card p-3 text-center rounded-xl"><span id="d">00</span><p>Days</p></div>
  <div class="card p-3 text-center rounded-xl"><span id="h">00</span><p>Hrs</p></div>
  <div class="card p-3 text-center rounded-xl"><span id="m">00</span><p>Min</p></div>
  <div class="card p-3 text-center rounded-xl"><span id="s">00</span><p>Sec</p></div>
</div>

<!-- ACTION -->
<div class="mt-6 flex flex-col gap-3 w-full max-w-xs">
  <a id="tweet" target="_blank"
     class="bg-blue-500 text-center py-3 rounded-full font-bold">
     🚀 Share on X
  </a>

  <button onclick="copyLink()" class="text-xs opacity-50">
    🔗 Copy Link
  </button>
</div>

<!-- TASKS -->
<div class="mt-8 w-full max-w-md card p-5 rounded-2xl">
  <h3 class="text-center text-xs mb-4 uppercase opacity-60">Complete Tasks</h3>

  <div class="grid grid-cols-2 gap-3 text-xs">
    
    <button onclick="done(this,'a')" class="task p-3 border rounded-lg">AAYSDAO</button>
    <button onclick="done(this,'b')" class="task p-3 border rounded-lg">OneFootball</button>
    <button onclick="done(this,'c')" class="task p-3 border rounded-lg">Base</button>
    <button onclick="done(this,'d')" class="task p-3 border rounded-lg">Animoca</button>
    <button onclick="done(this,'e')" class="task p-3 border rounded-lg">FIFARivals</button>
    <button onclick="done(this,'f')" class="task p-3 border rounded-lg">dnns</button>
    <button onclick="done(this,'g')" class="task p-3 border rounded-lg">viN040</button>

  </div>

  <!-- PROGRESS -->
  <div class="mt-4">
    <div class="w-full bg-white/10 h-2 rounded-full">
      <div id="bar" class="bg-[#00FF00] h-2 rounded-full w-0"></div>
    </div>
    <p id="progress" class="text-center text-[10px] mt-1 opacity-50">0 / 7 completed</p>
  </div>
</div>

<!-- CLAIM -->
<div class="mt-6 w-full max-w-md">
  <a id="claim"
     href="#"
     class="block text-center py-4 bg-gray-700 rounded-xl font-bold opacity-50 pointer-events-none">
     🔒 Complete Tasks to Unlock
  </a>
</div>

<script>

// COUNTDOWN
const target = new Date("April 9, 2026 00:00:00").getTime();

setInterval(()=>{
  let now = new Date().getTime();
  let dist = target - now;

  d.innerText = Math.floor(dist/86400000);
  h.innerText = Math.floor((dist%86400000)/3600000);
  m.innerText = Math.floor((dist%3600000)/60000);
  s.innerText = Math.floor((dist%60000)/1000);
},1000);

// COPY
function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("Copied!");
}

// TASK TRACKER
let total = 7;
let doneCount = 0;

function done(el,id){
  if(el.classList.contains("done")) return;

  el.classList.add("done");
  doneCount++;

  updateProgress();
}

// UPDATE PROGRESS
function updateProgress(){
  let percent = (doneCount/total)*100;
  bar.style.width = percent+"%";
  progress.innerText = doneCount+" / "+total+" completed";

  if(doneCount === total){
    claim.classList.remove("opacity-50","pointer-events-none","bg-gray-700");
    claim.classList.add("bg-[#00FF00]","text-black");
    claim.innerText = "🎉 CLAIM .FOOTBALL ID";
    claim.href = "https://play.google.com/store/apps/details?id=de.motain.iliga";
  }
}

// TWEET
tweet.href = `https://x.com/intent/tweet?text=${encodeURIComponent(
"$OFC countdown is LIVE 🚀 Built by @AAYSDAO\nJoin now ⚽️"
)}&url=${encodeURIComponent(location.href)}`;

</script>

</body>
</html>
